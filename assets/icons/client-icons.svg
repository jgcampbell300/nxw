<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Client gradients -->
    <linearGradient id="factorioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="empyrionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="fpsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="simcityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="7dtdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="adventureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Factorio Icon - Factory/Gear -->
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="30" fill="url(#factorioGrad)" opacity="0.2"/>
    <path d="M -15 -15 L 15 -15 L 15 15 L -15 15 Z M -8 -8 L 8 -8 L 8 8 L -8 8 Z" 
          fill="none" stroke="url(#factorioGrad)" stroke-width="2" filter="url(#iconGlow)"/>
    <circle cx="0" cy="0" r="5" fill="url(#factorioGrad)" filter="url(#iconGlow)"/>
    <text x="0" y="50" font-family="Orbitron, monospace" font-size="12" text-anchor="middle" fill="url(#factorioGrad)">FACTORIO</text>
  </g>
  
  <!-- Empyrion Icon - Rocket/Planet -->
  <g transform="translate(150, 50)">
    <circle cx="0" cy="0" r="30" fill="url(#empyrionGrad)" opacity="0.2"/>
    <path d="M 0 -20 L -5 -5 L -10 15 L 0 10 L 10 15 L 5 -5 Z" 
          fill="url(#empyrionGrad)" filter="url(#iconGlow)"/>
    <circle cx="0" cy="5" r="8" fill="none" stroke="url(#empyrionGrad)" stroke-width="2" filter="url(#iconGlow)"/>
    <text x="0" y="50" font-family="Orbitron, monospace" font-size="12" text-anchor="middle" fill="url(#empyrionGrad)">EMPYRION</text>
  </g>
  
  <!-- FPS Icon - Crosshair/Target -->
  <g transform="translate(250, 50)">
    <circle cx="0" cy="0" r="30" fill="url(#fpsGrad)" opacity="0.2"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="url(#fpsGrad)" stroke-width="2" filter="url(#iconGlow)"/>
    <circle cx="0" cy="0" r="3" fill="url(#fpsGrad)" filter="url(#iconGlow)"/>
    <line x1="-20" y1="0" x2="-8" y2="0" stroke="url(#fpsGrad)" stroke-width="2" filter="url(#iconGlow)"/>
    <line x1="8" y1="0" x2="20" y2="0" stroke="url(#fpsGrad)" stroke-width="2" filter="url(#iconGlow)"/>
    <line x1="0" y1="-20" x2="0" y2="-8" stroke="url(#fpsGrad)" stroke-width="2" filter="url(#iconGlow)"/>
    <line x1="0" y1="8" x2="0" y2="20" stroke="url(#fpsGrad)" stroke-width="2" filter="url(#iconGlow)"/>
    <text x="0" y="50" font-family="Orbitron, monospace" font-size="12" text-anchor="middle" fill="url(#fpsGrad)">FPS</text>
  </g>
  
  <!-- SimCity Icon - Buildings -->
  <g transform="translate(350, 50)">
    <circle cx="0" cy="0" r="30" fill="url(#simcityGrad)" opacity="0.2"/>
    <rect x="-15" y="-5" width="8" height="20" fill="url(#simcityGrad)" filter="url(#iconGlow)"/>
    <rect x="-5" y="-10" width="8" height="25" fill="url(#simcityGrad)" filter="url(#iconGlow)"/>
    <rect x="5" y="-8" width="8" height="23" fill="url(#simcityGrad)" filter="url(#iconGlow)"/>
    <text x="0" y="50" font-family="Orbitron, monospace" font-size="12" text-anchor="middle" fill="url(#simcityGrad)">SIMCITY</text>
  </g>
  
  <!-- 7D2D Icon - Zombie/Survival -->
  <g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="30" fill="url(#7dtdGrad)" opacity="0.2"/>
    <circle cx="0" cy="-5" r="8" fill="url(#7dtdGrad)" filter="url(#iconGlow)"/>
    <path d="M -8 5 Q -8 15 0 15 Q 8 15 8 5" fill="url(#7dtdGrad)" filter="url(#iconGlow)"/>
    <circle cx="-3" cy="-7" r="1" fill="#374151"/>
    <circle cx="3" cy="-7" r="1" fill="#374151"/>
    <text x="0" y="50" font-family="Orbitron, monospace" font-size="12" text-anchor="middle" fill="url(#7dtdGrad)">7DTD</text>
  </g>
  
  <!-- Adventure Icon - Sword/Quest -->
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="30" fill="url(#adventureGrad)" opacity="0.2"/>
    <path d="M 0 -20 L -3 -5 L -3 15 L 0 20 L 3 15 L 3 -5 Z" 
          fill="url(#adventureGrad)" filter="url(#iconGlow)"/>
    <rect x="-8" y="-8" width="16" height="6" fill="url(#adventureGrad)" filter="url(#iconGlow)"/>
    <circle cx="0" cy="18" r="4" fill="url(#adventureGrad)" filter="url(#iconGlow)"/>
    <text x="0" y="50" font-family="Orbitron, monospace" font-size="12" text-anchor="middle" fill="url(#adventureGrad)">ADVENTURE</text>
  </g>
  
  <!-- Universe Icon - Galaxy/Spiral -->
  <g transform="translate(300, 150)">
    <circle cx="0" cy="0" r="30" fill="url(#cosmicGradient)" opacity="0.2"/>
    <path d="M 0 0 Q -10 -10 -20 0 Q -10 10 0 0 Q 10 -10 20 0 Q 10 10 0 0" 
          fill="none" stroke="url(#cosmicGradient)" stroke-width="2" filter="url(#iconGlow)"/>
    <circle cx="0" cy="0" r="3" fill="url(#cosmicGradient)" filter="url(#iconGlow)"/>
    <text x="0" y="50" font-family="Orbitron, monospace" font-size="12" text-anchor="middle" fill="url(#cosmicGradient)">UNIVERSE</text>
  </g>
</svg>
